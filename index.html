<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 6.28: Dùng AI thế nào để học chủ động hơn?</title>
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            var errDiv = document.createElement('div');
            errDiv.style.cssText = 'position:fixed;top:0;left:0;background:red;color:white;z-index:9999;padding:20px;font-size:20px;';
            errDiv.innerHTML = "JS Error: " + msg + "<br>Line: " + lineNo + ":" + columnNo;
            document.body.appendChild(errDiv);
        };
        // Auto-clean old localStorage data to ensure fresh slide load
        const currentKey = 'ai_lesson_slides_data_38_v15';
        try {
            for (let i = localStorage.length - 1; i >= 0; i--) {
                const key = localStorage.key(i);
                if (key && key.startsWith('ai_lesson_slides_data_38_') && key !== currentKey) {
                    localStorage.removeItem(key);
                }
            }
        } catch (e) {}
    </script>
    <!-- Use Roboto and Inter fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=33">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app-container">
        <!-- Activity Progress and Lesson Navigation -->
        <div id="header-nav">
            <div class="lesson-buttons">
                <button id="btn-tiet-1" class="lesson-btn active" data-start-slide="0">
                    <i class="fas fa-rocket"></i> TIẾT 1
                </button>
                <button id="btn-tiet-2" class="lesson-btn locked" title="Tiết 2 chưa mở khoá">
                    <i class="fas fa-lock"></i> TIẾT 2
                </button>
                <button id="btn-tiet-3" class="lesson-btn locked" title="Tiết 3 chưa mở khoá">
                    <i class="fas fa-lock"></i> TIẾT 3
                </button>
            </div>
            
            <div id="header-title">VIỆN CÔNG NGHỆ NOVASTARS</div>
            
            <div class="activity-progress">
                <div class="progress-bar-label"><i class="fas fa-tasks"></i> TIẾN TRÌNH:</div>
                <div class="progress-track">
                    <div id="progress-fill" style="width: 0%;"></div>
                </div>
                <div id="progress-percentage">0%</div>
            </div>
        </div>

        <!-- Main Content Area with Sidebar -->
        <div id="main-layout">
            <div id="sidebar-left">
                <div class="sidebar-title"><i class="fas fa-route"></i> TIẾN TRÌNH BÀI HỌC</div>
                <div class="sidebar-menu">
                    <div class="menu-item active" data-range="0-7" onclick="goToSlide(0)">
                        <span class="status-icon"><i class="fas fa-circle-notch fa-spin"></i></span>
                        <span class="menu-text">Khởi động & Chuẩn bị</span>
                    </div>
                    <div class="menu-item" data-range="8-9" onclick="goToSlide(8)">
                        <span class="status-icon"><i class="far fa-circle"></i></span>
                        <span class="menu-text">GĐ 1: Điều tra sự cố AI</span>
                    </div>
                    <div class="menu-item" data-range="10-11" onclick="goToSlide(10)">
                        <span class="status-icon"><i class="far fa-circle"></i></span>
                        <span class="menu-text">GĐ 2: Nhận yêu cầu</span>
                    </div>
                    <div class="menu-item" data-range="12-16" onclick="goToSlide(12)">
                        <span class="status-icon"><i class="far fa-circle"></i></span>
                        <span class="menu-text">GĐ 3: Thu thập dữ liệu</span>
                    </div>
                    <div class="menu-item" data-range="17-22" onclick="goToSlide(17)">
                        <span class="status-icon"><i class="far fa-circle"></i></span>
                        <span class="menu-text">GĐ 4: Phân tích thông tin</span>
                    </div>
                    <div class="menu-item" data-range="23-27" onclick="goToSlide(23)">
                        <span class="status-icon"><i class="far fa-circle"></i></span>
                        <span class="menu-text">GĐ 5: Đóng gói thuật toán</span>
                    </div>
                    <div class="menu-item" data-range="28-32" onclick="goToSlide(28)">
                        <span class="status-icon"><i class="far fa-circle"></i></span>
                        <span class="menu-text">GĐ 6: Thử nghiệm quy trình</span>
                    </div>
                    <div class="menu-item" data-range="33-34" onclick="goToSlide(33)">
                        <span class="status-icon"><i class="far fa-circle"></i></span>
                        <span class="menu-text">GĐ 7: Nhật kí chuyên gia</span>
                    </div>
                    <div class="menu-item" data-range="35-39" onclick="goToSlide(35)">
                        <span class="status-icon"><i class="far fa-circle"></i></span>
                        <span class="menu-text">GĐ 8: Vận hành hệ thống</span>
                    </div>
                </div>
            </div>

            <!-- Main Presentation Area -->
            <div id="presentation-frame">
                <div id="slide-content">
                    <!-- Slide content will be injected here via JS -->
                </div>
            </div>
        </div>

        <!-- Toolbar -->
        <div id="toolbar">
            <div class="toolbar-group">
                <button id="btn-prev" title="Slide trước"><i class="fas fa-chevron-left"></i></button>
                <div class="slide-indicator">
                    <span id="current-slide">1</span> / <span id="total-slides">39</span>
                </div>
                <button id="btn-next" title="Slide tiếp"><i class="fas fa-chevron-right"></i></button>
            </div>
            
            <div class="toolbar-group">
                <label for="slide-selector">Tới slide:</label>
                <select id="slide-selector">
                    <!-- Options injected via JS -->
                </select>
            </div>

            <div class="toolbar-group">
                <button id="btn-edit-mode" class="mode-btn"><i class="fas fa-edit"></i> Chỉnh sửa</button>
                <button id="btn-save" class="hidden" title="Lưu thay đổi"><i class="fas fa-save"></i> Lưu</button>
                <button id="btn-reset-cache" title="Khôi phục Slide gốc"><i class="fas fa-undo"></i> Reset</button>
                <button id="btn-present-mode" class="mode-btn"><i class="fas fa-expand"></i> Trình chiếu</button>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="slides.js?v=33"></script>
    <script src="app.js?v=33"></script>
</body>
</html>
